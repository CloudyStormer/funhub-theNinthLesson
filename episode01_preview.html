<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>夜盲同学 第1集粗剪预览</title>
  <style>
    body {
      margin: 0;
      background: #101314;
      color: #e8eceb;
      font-family: "Microsoft YaHei", Arial, sans-serif;
    }
    header {
      padding: 24px;
      border-bottom: 1px solid #2a3032;
    }
    h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
    }
    main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 24px;
    }
    .shot {
      display: grid;
      grid-template-columns: minmax(280px, 520px) 1fr;
      gap: 20px;
      align-items: start;
      padding: 20px 0;
      border-bottom: 1px solid #2a3032;
    }
    img {
      width: 100%;
      border-radius: 6px;
      display: block;
      background: #1a1f21;
    }
    .time {
      color: #f06b5f;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .caption {
      font-size: 20px;
      line-height: 1.5;
      margin-bottom: 12px;
    }
    .note {
      color: #aeb8b6;
      line-height: 1.6;
    }
    @media (max-width: 760px) {
      .shot {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>《夜盲同学》第1集粗剪预览</h1>
  </header>
  <main>
    <section class="shot">
      <img src="assets/episode01/ep01_01_lin_zhou_medical_record_1.0.png" alt="林昼举病历撒谎">
      <div>
        <div class="time">00:00-00:13</div>
        <div class="caption">我只是想逃一次晚自习。</div>
        <div class="note">轻微推近。教室白噪音，学生低笑。</div>
      </div>
    </section>
    <section class="shot">
      <img src="assets/episode01/ep01_02_teaching_building_red_light_1.0.png" alt="夜晚教学楼红光">
      <div>
        <div class="time">00:13-00:24</div>
        <div class="caption">明明全校停电，三楼却亮着红光。</div>
        <div class="note">从远慢推。夜风，低频嗡鸣。</div>
      </div>
    </section>
    <section class="shot">
      <img src="assets/episode01/ep01_03_door_crack_ninth_class_1.0.png" alt="门缝里的第九节课">
      <div>
        <div class="time">00:24-00:38</div>
        <div class="caption">我从门缝里看见一排学生背对黑板。</div>
        <div class="note">窄幅缓慢推近。电流声，点名册翻页。</div>
      </div>
    </section>
    <section class="shot">
      <img src="assets/episode01/ep01_04_chen_yu_turns_1.0.png" alt="陈雨歪脸回头">
      <div>
        <div class="time">00:38-00:49</div>
        <div class="caption">她的脸，像贴错了一样。</div>
        <div class="note">慢推特写。红灯电流声，心跳进入。</div>
      </div>
    </section>
    <section class="shot">
      <img src="assets/episode01/ep01_05_teacher_approaches_1.0.png" alt="值夜老师走向门口">
      <div>
        <div class="time">00:49-00:58</div>
        <div class="caption">整个教室都安静了。</div>
        <div class="note">低角度慢推。脚步声，突然静音。</div>
      </div>
    </section>
    <section class="shot">
      <img src="assets/episode01/ep01_06_lin_zhou_fake_blind_1.0.png" alt="林昼撞门框装瞎">
      <div>
        <div class="time">00:58-01:08</div>
        <div class="caption">“老师，我看不见。”</div>
        <div class="note">轻微手持晃动。撞门声，呼吸声。</div>
      </div>
    </section>
    <section class="shot">
      <img src="assets/episode01/ep01_07_attendance_book_observe_1.0.png" alt="点名册待观察">
      <div>
        <div class="time">01:08-01:15</div>
        <div class="caption">林昼，待观察。</div>
        <div class="note">定格放大。笔尖写字声，低频收尾。</div>
      </div>
    </section>
  </main>
</body>
</html>
